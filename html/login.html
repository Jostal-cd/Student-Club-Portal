<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Club Portal</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/layout.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div style="text-align: center; margin-bottom: 30px;">
            <span class="logo-icon" style="font-size: 2rem;">🏛️</span>
            <h2 style="margin-top: 10px;">Portal Login</h2>
            <p class="muted">Clubs and Faculty Authorization</p>
        </div>

        <div id="error-message" class="error-msg">Invalid credentials</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn w-full" id="login-btn">Login</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="muted" style="text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
