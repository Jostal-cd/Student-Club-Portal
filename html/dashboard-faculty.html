<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Student Club Portal</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/layout.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 30px;
        }

        .event-card {
            background: white;
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .event-card h3 {
            margin-bottom: 10px;
        }

        .event-detail {
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        .action-buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-logo">
            <span class="logo-icon">🏛️</span> Faculty Dashboard
        </div>
        <ul class="nav-menu">
            <li><span id="welcome-msg" style="font-weight: 500; margin-right: 15px;"></span></li>
            <li><a href="#" id="logout-btn" class="btn-outline btn-sm">Logout</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 800px; padding-top: 40px; padding-bottom: 60px;">
        <h2 style="font-size: 1.8rem; color: #111827; margin-bottom: 10px;">Pending Event Approvals</h2>
        <p class="muted" style="margin-bottom: 30px; font-size: 1.05rem;">Review and approve newly submitted events from
            clubs.</p>

        <div id="pending-events-list">
            <!-- Events populated by JS -->
        </div>

        <h2 style="font-size: 1.8rem; color: #111827; margin-top: 50px; margin-bottom: 10px;">Event History</h2>
        <p class="muted" style="margin-bottom: 30px; font-size: 1.05rem;">Previously approved or rejected events.</p>

        <div id="history-events-list">
            <!-- History Events populated by JS -->
        </div>
    </div>

    <script src="../js/dashboard-faculty.js"></script>
</body>

</html>
